name: Secret Scan

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run secret scanner (working tree)
        shell: pwsh
        run: ./scripts/scan-secrets.ps1

      - name: Run secret scanner (git history)
        shell: pwsh
        run: ./scripts/scan-secrets.ps1 -IncludeHistory
